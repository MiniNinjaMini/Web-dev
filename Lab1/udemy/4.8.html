<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slacker Card</title>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300' rel='stylesheet' type='text/css'>
  <meta name="udacity-grader" content="tests.json">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Open Sans', sans-serif;
      color: #222;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }
    .card {
      height: 475px;
      width: 325px;
      box-shadow: 0px 5px 15px 0px rgba(153,153,153,0.5);
      border-radius: 4px;
      overflow: hidden;
      background-color: #fff;
    }
    .top {
      height: 55%;
      border-radius: 4px 4px 0 0;
      border: 1px solid #ddd;
      padding: 0px 16px;
      background-image: url('https://via.placeholder.com/325x260'); /* placeholder image */
      background-size: cover;
      background-position: center;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .name {
      margin: 0;
      font-weight: 600;
      font-size: 1.4em;
    }
    .status {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-left: 4px;
      border-radius: 50%;
      background-color: #60D156;
    }
