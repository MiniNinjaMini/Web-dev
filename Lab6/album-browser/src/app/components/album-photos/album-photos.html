<div class="photos-page">
  <button class="btn-back" [routerLink]="['/albums', albumId]">
    ← Back to Album Details
  </button>

  <h2>Photos of Album #{{ albumId }}</h2>

  @if (errorMessage) {
    <div class="error-message">⚠️ {{ errorMessage }}</div>
  } @else if (loading) {
    <div class="loader">Loading photos...</div>
  } @else {
    @if (photos.length === 0) {
      <p class="empty-state">No photos found for this album.</p>
    } @else {
      <div class="photo-grid">
        @for (photo of photos; track photo.id) {
          <div class="photo-card">
            <img [src]="photo.thumbnailUrl" [alt]="photo.title">
            <p class="photo-title">{{ photo.title }}</p>
          </div>
        }
      </div>
    }
  }
</div>
